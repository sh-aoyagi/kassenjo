<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>風雲！決算城 ｜ 敵は経済にあり！</title>
<meta name="description" content="戦国武将が現代企業の決算書を斬る。金融教育エンタメメディア。">
<meta property="og:title" content="風雲！決算城">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --white:   #f0ebe0;
    --gold:    #c9a84c;
    --crimson: #c0392b;
    --transition-duration: 900ms;
    --transition-ease: cubic-bezier(0.76, 0, 0.24, 1);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Noto Sans JP', 'Helvetica Neue', sans-serif;
    font-weight: 300;
    cursor: default;
  }

  /* ─── イントロ ─── */
  #intro {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.9s ease;
    pointer-events: none;
  }
  #intro.hidden { opacity: 0; }
  #intro-logo {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: clamp(1.4rem, 3.5vw, 2.8rem);
    letter-spacing: 0.3em;
    color: var(--white);
  }

  /* ─── Stage ─── */
  #stage {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ─── Slides ─── */
  .slide {
    position: absolute;
    inset: 0;
    z-index: 0;
    opacity: 0;
    pointer-events: none;
  }
  .slide.is-current {
    opacity: 1;
    z-index: 2;
    pointer-events: auto;
    transition: opacity 0.9s ease;
  }
  .slide.is-next {
    opacity: 0;          /* 黒背景が透けないよう完全に隠す */
    z-index: 1;
    pointer-events: none;
  }

  .slide-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: opacity 0s;
  }

  /* splitが始まった瞬間にbgを消す → パネルの裏が黒になる */
  .slide.is-splitting .slide-bg {
    opacity: 0;
  }

  /* 暗めオーバーレイ（テキスト可読性） */
  .slide-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.38);
  }

  /* Split panels */
  .panel-left, .panel-right {
    position: absolute;
    top: 0; bottom: 0;
    width: 50%;
    overflow: hidden;
    will-change: transform;
  }
  .panel-left  { left: 0; }
  .panel-right { right: 0; }

  .panel-left  .panel-inner {
    position: absolute; inset: 0;
    width: 200%; left: 0;
    background-size: cover;
    background-position: left center;
  }
  .panel-right .panel-inner {
    position: absolute; inset: 0;
    width: 200%; right: 0; left: -100%;
    background-size: cover;
    background-position: right center;
  }

  .slide.is-splitting .panel-left {
    animation: splitLeft var(--transition-duration) var(--transition-ease) forwards;
  }
  .slide.is-splitting .panel-right {
    animation: splitRight var(--transition-duration) var(--transition-ease) forwards;
  }

  @keyframes splitLeft  { to { transform: translateX(-100%); } }
  @keyframes splitRight { to { transform: translateX(100%);  } }

  /* ─── テキストオーバーレイ ─── */
  .slide-text {
    position: absolute;
    inset: 0;                    /* 全面を覆う */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;     /* 完全中央 */
    text-align: center;
    color: var(--white);
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
    background: none;
  }

  /* 帯は疑似要素で横方向にグラデーション */
  .slide-text::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%; transform: translateY(-50%);
    height: 13rem;               /* テキスト分の高さ */
    background: linear-gradient(
      to right,
      transparent 0%,
      rgba(0,0,0,0.80) 12%,
      rgba(0,0,0,0.84) 50%,
      rgba(0,0,0,0.80) 88%,
      transparent 100%
    );
    z-index: -1;
  }

  .slide-text .work-castle {
    display: block;
    font-size: clamp(10px, 1vw, 12px);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    font-weight: 300;
    opacity: 0.9;
  }
  .slide-text .work-title {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(22px, 3.2vw, 48px);
    font-weight: 300;
    letter-spacing: 0.03em;
    line-height: 1.2;
  }
  .slide-text .work-director {
    font-size: clamp(14px, 1.8vw, 26px);
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1.3;
    opacity: 0.72;
    margin-top: 6px;
  }
  .slide-text .work-score {
    display: block;
    font-size: clamp(10px, 0.9vw, 12px);
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-top: 16px;
    opacity: 0.8;
  }
  .slide-text .view-film {
    display: inline-block;
    margin-top: 20px;
    font-size: clamp(10px, 1vw, 13px);
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0;
    color: rgba(240,235,224,0.75);
    transition: opacity 0.3s, color 0.2s;
    cursor: pointer;
    text-decoration: none;
    border-bottom: 1px solid rgba(240,235,224,0.3);
    padding-bottom: 2px;
    pointer-events: auto;
  }
  .view-film:hover { color: var(--gold); border-bottom-color: var(--gold); }
  .slide.is-current .slide-text .view-film { opacity: 1; }
  .slide.is-current .slide-text { animation: textFadeIn 0.6s 0.4s ease both; }
  .slide.is-splitting .slide-text { opacity: 0; transition: opacity 0.15s; }

  @keyframes textFadeIn {
    from { opacity: 0; transform: translate(-50%, calc(-50% + 14px)); }
    to   { opacity: 1; transform: translate(-50%, -50%); }
  }

  /* ─── Nav ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 28px 36px;
  }
  nav .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--white);
    text-decoration: none;
  }
  nav .nav-links {
    display: flex;
    gap: 28px;
  }
  nav .nav-links a, nav .nav-links span {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--white);
    text-decoration: none;
    opacity: 0.85;
    transition: opacity 0.2s;
    cursor: pointer;
  }
  nav .nav-links a:hover, nav .nav-links span:hover { opacity: 0.4; }

  /* ─── 記事一覧パネル ─── */
  #panel {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 4rem 3.5rem;
    transform: translateX(-100%);
    transition: transform 0.65s cubic-bezier(0.7, 0, 0.3, 1);
  }
  #panel.open { transform: translateX(0); }

  .panel-close-btn {
    position: absolute;
    top: 28px; right: 36px;
    background: none; border: none;
    color: var(--white);
    font-size: 13px;
    letter-spacing: 0.12em;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .panel-close-btn:hover { opacity: 1; }

  .panel-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: rgba(240,235,224,0.4);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .panel-list { list-style: none; }
  .panel-list li {
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 1.2rem 0;
  }
  .panel-list li:last-child { border-bottom: 1px solid rgba(255,255,255,0.08); }
  .panel-list a {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    color: var(--white);
    text-decoration: none;
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.8rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .panel-list a:hover { color: var(--gold); }
  .p-num { font-size: 11px; color: rgba(240,235,224,0.35); letter-spacing: 0.1em; font-family: 'Noto Sans JP', sans-serif; }
  .p-score { margin-left: auto; font-size: 11px; color: var(--gold); letter-spacing: 0.1em; font-family: 'Noto Sans JP', sans-serif; }

  /* ─── 右インジケーター（ライン） ─── */
  #indicator {
    position: fixed;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 100;
  }
  .ind-line {
    display: block;
    width: 20px; height: 2px;
    background: rgba(240,235,224,0.3);
    border-radius: 1px;
    transition: background 0.4s, width 0.4s;
    cursor: pointer;
  }
  .ind-line.active {
    background: var(--gold);
    width: 30px;
  }

  /* ─── 下部ラベル ─── */
  #bottom-label {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    padding-bottom: 22px;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(240,235,224,0.4);
    pointer-events: none;
    white-space: nowrap;
  }

  /* ─── スマホ ─── */
  @media (max-width: 768px) {
    nav { padding: 20px; }
    .slide-text { white-space: normal; }
    #panel { padding: 3rem 1.5rem; }
    .panel-list a { font-size: 1.1rem; }
    #indicator { right: 12px; }
    #bottom-label { display: none; }
  }
</style>
</head>
<body>

<!-- イントロ -->
<div id="intro"><div id="intro-logo">風雲！決算城</div></div>

<!-- Nav -->
<nav>
  <a href="/" class="logo">風雲！決算城</a>
  <div class="nav-links">
    <span id="panel-open">記事一覧</span>
    <a href="articles/001_google_alphabet.html">about</a>
  </div>
</nav>

<!-- Stage -->
<div id="stage"></div>

<!-- 記事一覧パネル -->
<div id="panel">
  <button class="panel-close-btn" id="panel-close">✕ 閉じる</button>
  <p class="panel-label">Articles</p>
  <ul class="panel-list">
    <li>
      <a href="articles/001_google_alphabet.html">
        <span class="p-num">001</span>
        Alphabet × 織田信長
        <span class="p-score">88</span>
      </a>
    </li>
    <li>
      <a href="articles/002_apple_japan.html">
        <span class="p-num">002</span>
        Apple × 織田信長
        <span class="p-score">88</span>
      </a>
    </li>
    <li>
      <a href="articles/003_microsoft_japan.html">
        <span class="p-num">003</span>
        Microsoft × 織田信長
        <span class="p-score">93</span>
      </a>
    </li>
  </ul>
</div>

<!-- 右インジケーター -->
<div id="indicator"></div>

<!-- 下部ラベル -->
<div id="bottom-label">最新記事</div>

<script>
// ── スライドデータ
const slides = [
  {
    img:      'images/001_hero.jpg?v=20260522',
    castle:   '安土城 — 織田信長',
    title:    '売上3,500億ドルの安土城',
    director: 'Alphabet（Google）2024年12月期',
    score:    'FIRE SCORE  88',
    href:     'articles/001_google_alphabet.html',
  },
  {
    img:      'images/002_hero.jpg?v=20260522',
    castle:   '安土城 — 織田信長',
    title:    'FCF1,120億ドルの安土城',
    director: 'Apple  2024年9月期',
    score:    'FIRE SCORE  88',
    href:     'articles/002_apple_japan.html',
  },
  {
    img:      'images/003_hero.jpg?v=20260522',
    castle:   '安土城 — 織田信長',
    title:    '営業利益率43%の安土城',
    director: 'Microsoft  2024年6月期',
    score:    'FIRE SCORE  93',
    href:     'articles/003_microsoft_japan.html',
  },
];

const stage     = document.getElementById('stage');
const indicator = document.getElementById('indicator');
let current     = 0;
let isAnimating = false;
let autoTimer;

// ── スライド生成
function buildSlide(data, index) {
  const el = document.createElement('div');
  el.className = 'slide';
  el.dataset.index = index;

  // フルBG
  const bg = document.createElement('div');
  bg.className = 'slide-bg';
  bg.style.backgroundImage = `url('${data.img}')`;

  // 左パネル
  const pL = document.createElement('div');
  pL.className = 'panel-left';
  const pLi = document.createElement('div');
  pLi.className = 'panel-inner';
  pLi.style.backgroundImage = `url('${data.img}')`;
  pL.appendChild(pLi);

  // 右パネル
  const pR = document.createElement('div');
  pR.className = 'panel-right';
  const pRi = document.createElement('div');
  pRi.className = 'panel-inner';
  pRi.style.backgroundImage = `url('${data.img}')`;
  pR.appendChild(pRi);

  // テキスト
  const txt = document.createElement('div');
  txt.className = 'slide-text';
  txt.innerHTML = `
    <span class="work-castle">${data.castle}</span>
    <div class="work-title">${data.title}</div>
    <div class="work-director">${data.director}</div>
    <span class="work-score">${data.score}</span>
    <a class="view-film" href="${data.href}">記事を読む →</a>
  `;

  el.appendChild(bg);
  el.appendChild(pL);
  el.appendChild(pR);
  el.appendChild(txt);
  return el;
}

const slideEls = slides.map((d, i) => {
  const el = buildSlide(d, i);
  stage.appendChild(el);
  return el;
});

// ── インジケーター生成
slides.forEach((_, i) => {
  const line = document.createElement('span');
  line.className = 'ind-line' + (i === 0 ? ' active' : '');
  line.addEventListener('click', () => goTo(i));
  indicator.appendChild(line);
});

function updateIndicator(idx) {
  document.querySelectorAll('.ind-line').forEach((l, i) => l.classList.toggle('active', i === idx));
}

// ── 初期化（1枚目はイントロの裏で即表示、transitionなし）
slideEls[0].classList.add('is-current');
slideEls[0].style.transition = 'none';
slideEls[1 % slides.length].classList.add('is-next');

// ── トランジション
function goTo(next) {
  if (isAnimating || next === current) return;
  isAnimating = true;
  clearTimeout(autoTimer);

  const outEl = slideEls[current];
  const inEl  = slideEls[next];

  // フェーズ1: splitアニメ開始
  outEl.classList.add('is-splitting');

  // フェーズ2: splitが終わったら真っ黒（is-nextはopacity:0なので自動的に黒）
  const splitDur = 960;
  setTimeout(() => {
    outEl.classList.remove('is-current', 'is-splitting');
    outEl.querySelectorAll('.panel-left, .panel-right').forEach(p => {
      p.style.animation = 'none';
      p.offsetHeight;
      p.style.animation = '';
    });

    // フェーズ3: 1秒真っ黒 → ふわっとフェードイン
    setTimeout(() => {
      inEl.classList.remove('is-next');
      inEl.classList.add('is-current'); // transition: opacity 0.9s が発火

      const nextNext = (next + 1) % slides.length;
      slideEls.forEach((el, i) => { if (i !== next) el.classList.remove('is-next'); });
      slideEls[nextNext].classList.add('is-next');

      current = next;
      updateIndicator(current);

      setTimeout(() => {
        isAnimating = false;
        scheduleAuto();
      }, 950); // フェードイン完了を待ってから次を受け付ける
    }, 300); // 黒の時間
  }, splitDur);
}

function nextSlide() { goTo((current + 1) % slides.length); }
function scheduleAuto() { autoTimer = setTimeout(nextSlide, 5000); }
scheduleAuto();

// ── ステージクリックで次へ（リンクは除く）
stage.addEventListener('click', e => {
  if (e.target.tagName === 'A') return;
  clearTimeout(autoTimer);
  nextSlide();
});

// ── パネル開閉
document.getElementById('panel-open').addEventListener('click', () => document.getElementById('panel').classList.add('open'));
document.getElementById('panel-close').addEventListener('click', () => document.getElementById('panel').classList.remove('open'));

// ── イントロ（スクランブル）
const POOL = 'あいうえおかきくけこさしすせそたちつてと0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const introLogo = document.getElementById('intro-logo');
const introEl   = document.getElementById('intro');
const target    = introLogo.textContent;
let frame = 0;
const total = Math.ceil(target.length / 1.5) + 6;
(function tick() {
  const done = Math.floor(frame * 1.5);
  introLogo.textContent = [...target].map((ch, i) => {
    if (/[\s　！？・「」【】（）／—]/.test(ch)) return ch;
    return i < done ? ch : POOL[Math.floor(Math.random() * POOL.length)];
  }).join('');
  frame++;
  if (frame <= total) { requestAnimationFrame(tick); }
  else {
    introLogo.textContent = target;
    setTimeout(() => {
      introEl.classList.add('hidden');
      setTimeout(() => introEl.style.display = 'none', 900);
    }, 500);
  }
})();
</script>
</body>
</html>
